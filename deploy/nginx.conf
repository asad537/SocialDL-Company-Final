# =============================================================================
# NGINX Configuration for SocialDL Media Downloader
# =============================================================================
# Target: Ubuntu 22.04 LTS
# Features: HLS streaming, gzip, sendfile, open_file_cache, rate limiting
# Cloudflare-ready: respects CF-Connecting-IP, caching headers
# =============================================================================

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=extract:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=download:10m rate=20r/m;
limit_req_zone $binary_remote_addr zone=merge:10m rate=10r/m;

# Upstream PHP-FPM
upstream php-fpm {
    server unix:/run/php/php8.1-fpm.sock;
    # For PHP 7.4:
    # server unix:/run/php/php7.4-fpm.sock;
}

server {
    listen 80;
    listen [::]:80;
    server_name 49.13.196.171 yourdomain.com www.yourdomain.com;

    # Redirect to HTTPS (if using Cloudflare, this handles SSL)
    # return 301 https://$server_name$request_uri;

    root /var/www/socialdl/public;
    index index.php;

    # ── Security Headers ─────────────────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Cloudflare Real IP ───────────────────────────────────────────────
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    real_ip_header CF-Connecting-IP;

    # ── Gzip Compression ─────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/vnd.apple.mpegurl
        video/mp2t
        image/svg+xml;

    # ── Sendfile + TCP Optimizations ─────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;

    # ── Open File Cache (huge perf boost for HLS segments) ───────────────
    open_file_cache max=10000 inactive=60s;
    open_file_cache_valid 30s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    # ── Client Settings ──────────────────────────────────────────────────
    client_max_body_size 10M;
    client_body_buffer_size 128k;

    # ── Static Assets (long cache) ───────────────────────────────────────
    location ~* \.(css|js|ico|gif|jpe?g|png|webp|svg|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ── HLS Streaming (high-performance static serving) ──────────────────
    location /hls/ {
        alias /var/www/socialdl/storage/app/hls/;

        # .m3u8 playlists — cache for 10 seconds (may update)
        location ~* \.m3u8$ {
            add_header Content-Type "application/vnd.apple.mpegurl";
            add_header Cache-Control "public, max-age=10";
            add_header Access-Control-Allow-Origin "*";
        }

        # .ts segments — cache aggressively (immutable)
        location ~* \.ts$ {
            add_header Content-Type "video/MP2T";
            add_header Cache-Control "public, max-age=86400, immutable";
            add_header Access-Control-Allow-Origin "*";
        }
    }

    # ── Download Files (nginx sendfile for completed downloads) ───────────
    location /internal-downloads/ {
        internal;
        alias /var/www/socialdl/storage/app/downloads/;
    }

    # ── Rate-Limited Routes ──────────────────────────────────────────────
    location = /extract {
        limit_req zone=extract burst=5 nodelay;
        try_files $uri /index.php?$query_string;
    }

    location = /proxy-download {
        limit_req zone=download burst=3 nodelay;
        proxy_buffering off;
        try_files $uri /index.php?$query_string;
    }

    location = /merge-download {
        limit_req zone=merge burst=2 nodelay;
        proxy_buffering off;
        proxy_read_timeout 600s;
        try_files $uri /index.php?$query_string;
    }

    # ── Laravel Application ──────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass php-fpm;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;

        # Timeouts for long operations
        fastcgi_read_timeout 300s;
        fastcgi_send_timeout 300s;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 256 16k;
        fastcgi_busy_buffers_size 256k;

        # Disable buffering for streaming downloads
        fastcgi_buffering off;
    }

    # ── Block dotfiles ───────────────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Logging ──────────────────────────────────────────────────────────
    access_log /var/log/nginx/socialdl_access.log;
    error_log /var/log/nginx/socialdl_error.log warn;
}
